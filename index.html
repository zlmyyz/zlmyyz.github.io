<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>一笔画</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;font-family:system-ui,-apple-system,Segoe UI,Arial,"Microsoft YaHei",sans-serif;color:#fff}
  #game{display:block;width:100vw;height:100vh;background:radial-gradient(circle at top,#223 0,#111 55%,#070707 100%);touch-action:none}
  .hud{position:fixed;left:0;right:0;top:0;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;font-weight:700;text-shadow:0 2px 8px #000}
  .hud div{background:rgba(0,0,0,.32);padding:8px 12px;border-radius:999px;backdrop-filter:blur(8px)}
  .panel{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:min(88vw,420px);background:rgba(20,20,28,.92);border:1px solid rgba(255,255,255,.15);border-radius:22px;padding:22px;text-align:center;box-shadow:0 20px 80px rgba(0,0,0,.5);backdrop-filter:blur(12px)}
  .panel h1{margin:0 0 8px;font-size:30px}.panel p{line-height:1.65;color:#ddd;margin:10px 0 18px}.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.btn{border:0;border-radius:14px;padding:12px 18px;font-size:16px;font-weight:800;color:#111;background:#ffd45c}.btn.secondary{background:#e8e8e8}.hide{display:none}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud"><div id="levelText">第 1 关</div><div id="infoText">0 / 0</div></div>
<div id="panel" class="panel">
  <h1>一笔画</h1>
  <p>从亮点开始拖动，沿着线走。每条线只能走一次，全部走完即过关。新版已过滤无解图，不会再出标准信封这种死关。</p>
  <div class="btns"><button class="btn" id="startBtn">开始</button><button class="btn secondary" id="resetSaveBtn">清空进度</button></div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const panel=document.getElementById('panel'),startBtn=document.getElementById('startBtn'),resetSaveBtn=document.getElementById('resetSaveBtn');
const levelText=document.getElementById('levelText'),infoText=document.getElementById('infoText');
let W=0,H=0,DPR=1,level=+(localStorage.oneStrokeLevel||1),graph=null,drag=false,current=null,used=new Set(),path=[];
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);draw()} addEventListener('resize',resize);
function edgeKey(a,b){return a<b?a+'-'+b:b+'-'+a'}
function degree(points,edges){let d=Array(points.length).fill(0);for(const e of edges){d[e[0]]++;d[e[1]]++}return d}
function connected(points,edges){let adj=points.map(()=>[]);for(const [a,b] of edges){adj[a].push(b);adj[b].push(a)}let seen=new Set([0]),st=[0];while(st.length){let v=st.pop();for(const n of adj[v])if(!seen.has(n)){seen.add(n);st.push(n)}}return seen.size===points.length}
function hasEuler(points,edges){if(!connected(points,edges))return false;let odd=degree(points,edges).filter(x=>x%2===1).length;return odd===0||odd===2}
function makeSolvableLevel(lv){
  // 先生成一条不重复边的主路径，天然存在欧拉路径；再少量添加成对边，保持奇点数为0或2。
  const n=Math.min(5+Math.floor(lv/2),14),cols=Math.ceil(Math.sqrt(n)),rows=Math.ceil(n/cols);
  let pts=[];const gap=Math.min(W/(cols+1),H*.62/(rows+1));const ox=W/2-gap*(cols-1)/2,oy=H*.18;
  for(let i=0;i<n;i++){let c=i%cols,r=Math.floor(i/cols);pts.push({x:ox+c*gap+(Math.random()-.5)*gap*.18,y:oy+r*gap+(Math.random()-.5)*gap*.18})}
  let ids=[...Array(n).keys()];for(let i=ids.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[ids[i],ids[j]]=[ids[j],ids[i]]}
  let es=[],set=new Set();for(let i=0;i<ids.length-1;i++){let k=edgeKey(ids[i],ids[i+1]);set.add(k);es.push([ids[i],ids[i+1]])}
  let extra=Math.min(Math.floor(lv/2),8),tries=0;
  while(extra>0&&tries++<300){let a=Math.floor(Math.random()*n),b=Math.floor(Math.random()*n);if(a===b)continue;let k=edgeKey(a,b);if(set.has(k))continue;set.add(k);es.push([a,b]);if(hasEuler(pts,es)){extra--}else{set.delete(k);es.pop()}}
  if(!hasEuler(pts,es))return makeSolvableLevel(lv);
  let odd=degree(pts,es).map((v,i)=>v%2?i:null).filter(v=>v!==null);
  let start=odd.length===2?odd[0]:ids[0];
  return {points:pts,edges:es,start};
}
function loadLevel(){graph=makeSolvableLevel(level);used.clear();path=[graph.start];current=graph.start;drag=false;levelText.textContent='第 '+level+' 关';updateInfo();draw()}
function updateInfo(){infoText.textContent=used.size+' / '+graph.edges.length}
function nearPoint(x,y){let best=null,bd=36;graph.points.forEach((p,i)=>{let d=Math.hypot(p.x-x,p.y-y);if(d<bd){bd=d;best=i}});return best}
function tryMove(to){if(to===null||to===current)return;let k=edgeKey(current,to);let exists=graph.edges.some(e=>edgeKey(e[0],e[1])===k);if(exists&&!used.has(k)){used.add(k);current=to;path.push(to);updateInfo();if(used.size===graph.edges.length){setTimeout(()=>{level++;localStorage.oneStrokeLevel=level;panel.querySelector('h1').textContent='过关';panel.querySelector('p').textContent='进入下一关。';startBtn.textContent='下一关';panel.classList.remove('hide')},180)}draw()}}
function pos(e){let t=e.touches?e.touches[0]:e;let r=canvas.getBoundingClientRect();return{x:t.clientX-r.left,y:t.clientY-r.top}}
canvas.addEventListener('pointerdown',e=>{if(!graph)return;let p=pos(e),n=nearPoint(p.x,p.y);if(n===graph.start||n===current){drag=true;current=n;path=[...path,current].filter((v,i,a)=>i===0||v!==a[i-1]);draw()}});
canvas.addEventListener('pointermove',e=>{if(!drag)return;let p=pos(e);tryMove(nearPoint(p.x,p.y))});
canvas.addEventListener('pointerup',()=>drag=false);canvas.addEventListener('pointercancel',()=>drag=false);
function draw(){if(!ctx)return;ctx.clearRect(0,0,W,H);if(!graph)return;ctx.lineCap='round';ctx.lineJoin='round';
  for(const [a,b] of graph.edges){let pa=graph.points[a],pb=graph.points[b],k=edgeKey(a,b);ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.strokeStyle=used.has(k)?'#ffd45c':'rgba(255,255,255,.26)';ctx.lineWidth=used.has(k)?9:6;ctx.stroke()}
  for(let i=0;i<graph.points.length;i++){let p=graph.points[i];ctx.beginPath();ctx.arc(p.x,p.y,i===current?15:12,0,Math.PI*2);ctx.fillStyle=i===graph.start?'#55ff99':(i===current?'#ffd45c':'#f4f4f4');ctx.fill();ctx.lineWidth=3;ctx.strokeStyle='rgba(0,0,0,.45)';ctx.stroke()}
}
startBtn.onclick=()=>{panel.classList.add('hide');loadLevel()};
resetSaveBtn.onclick=()=>{level=1;localStorage.oneStrokeLevel=1;panel.querySelector('h1').textContent='一笔画';panel.querySelector('p').textContent='进度已清空。点击开始。';startBtn.textContent='开始'};
resize();
</script>
</body>
</html>
